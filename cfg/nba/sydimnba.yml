# ------------------- General Options -------------------------
description                  : sydim
results_root_dir             : results
dataset                      : nba

# ------------------- Dataset -------------------------
past_frames                  : 10
future_frames                : 20
min_past_frames              : 10
min_future_frames            : 20

motion_dim                   : 2
forecast_dim                 : 2

traj_mean                    : [14, 7.5]
traj_scale                   : 5

# ------------------- Model -------------------------
pretrained_core_denoising_model: './results/checkpoints/d_gan.p'
model_initializer      : './results/checkpoints/model_0010.p'
debug                        : False

diffusion                    : {
  steps                      : 50,
  beta_start                 : 1.e-4,
  beta_end                   : 5.e-2,
  beta_schedule              : 'linear'
}

# ------------------- Training Parameters -------------------------
lr                           : 1.e-4
train_batch_size             : 3
test_batch_size              : 50
num_epochs                   : 100
test_interval                : 1
lr_scheduler                 : 'step'
decay_step                   : 8
decay_gamma                  : 0.5


lambda_dist                  : 1.0
lambda_uncertainty           : 0.1
reweight_temperature         : 1.0
num_discriminator_steps      : 1

